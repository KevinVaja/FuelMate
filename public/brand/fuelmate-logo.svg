<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 160" role="img" aria-labelledby="title desc">
  <title id="title">FuelMate logo</title>
  <desc id="desc">FuelMate wordmark with a fuel drop and delivery route inside a rounded panel.</desc>
  <defs>
    <linearGradient id="fuelmateCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F6453A"/>
      <stop offset="100%" stop-color="#FF7A65"/>
    </linearGradient>
    <linearGradient id="fuelmateMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D7E7E0"/>
      <stop offset="100%" stop-color="#8FB9AD"/>
    </linearGradient>
    <linearGradient id="fuelmatePanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9F3"/>
      <stop offset="100%" stop-color="#F2E7DC"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2D2722" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g filter="url(#panelShadow)">
    <rect x="10" y="12" width="600" height="136" rx="34" fill="url(#fuelmatePanel)" stroke="#E2D5C7" stroke-width="2"/>
    <rect x="34" y="36" width="88" height="88" rx="28" fill="#223039"/>
    <g transform="translate(34 36)">
      <path d="M18 50c0-18 14-32 32-32 7 0 14 2 20 6" fill="none" stroke="url(#fuelmateMint)" stroke-linecap="round" stroke-width="6.5"/>
      <path d="M15 57c7 13 20 21 34 21 12 0 23-5 31-14" fill="none" stroke="url(#fuelmateCoral)" stroke-linecap="round" stroke-width="6.5"/>
      <path d="M21 57h12" fill="none" stroke="#FFF8F1" stroke-linecap="round" stroke-width="4.6"/>
      <path d="M25 67h9" fill="none" stroke="#FFF8F1" stroke-linecap="round" stroke-width="4.6"/>
      <path d="M46 24c-10 14-15 22-15 31 0 10 8 18 18 18s18-8 18-18c0-9-5-17-15-31-2-2-5-2-6 0z" fill="url(#fuelmateCoral)"/>
      <path d="M45 52c0 5 4 9 9 9s9-4 9-9c0-4-2-8-6-13-1-2-4-2-6 0-4 5-6 9-6 13z" fill="#FFF6EF" opacity="0.28"/>
      <path d="M60 38l14 8" fill="none" stroke="#FFF8F1" stroke-linecap="round" stroke-width="4.6"/>
      <path d="M57 49l17-9" fill="none" stroke="#FFF8F1" stroke-linecap="round" stroke-width="4.6"/>
      <path d="M74 41h5l4 3-2 6 5 1" fill="none" stroke="#FFF8F1" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.6"/>
    </g>
    <text x="150" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="47" font-weight="800" letter-spacing="-1.6" fill="#2D2722">Fuel<tspan fill="#F6453A">Mate</tspan></text>
    <text x="151" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="4" fill="#8D8073">EMERGENCY FUEL DELIVERY</text>
    <path d="M151 116h118" fill="none" stroke="#BFD6CF" stroke-linecap="round" stroke-width="5"/>
    <path d="M280 116h58" fill="none" stroke="#F6453A" stroke-linecap="round" stroke-width="5"/>
    <circle cx="351" cy="116" r="5" fill="#F6453A"/>
  </g>
</svg>
